name: E2E Tests (Post-Deploy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  deployment_status:

jobs:
  e2e:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Lightpanda
        run: |
          set +e
          curl -sSfL https://get.lightpanda.io | bash
          if ! which lightpanda > /dev/null 2>&1; then
            echo "Official installer failed, downloading from GitHub releases..."
            sudo curl -sL -o /usr/local/bin/lightpanda \
              "https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux"
            sudo chmod +x /usr/local/bin/lightpanda
          fi
          set -e
          which lightpanda || { echo "::error::Lightpanda installation failed"; exit 1; }

      - name: Create screenshots dir
        run: mkdir -p e2e/screenshots

      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting for deployment to be ready..."
          HEADER=""
          if [ -n "$VERCEL_BYPASS" ]; then
            HEADER="-H x-vercel-protection-bypass: $VERCEL_BYPASS"
          fi
          for i in $(seq 1 30); do
            if [ -n "$VERCEL_BYPASS" ]; then
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H "x-vercel-protection-bypass: $VERCEL_BYPASS" "$BASE_URL")
            else
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$BASE_URL")
            fi
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "✓ Deployment reachable (status=$STATUS)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Deployment not reachable after 5 minutes"
          exit 1
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}

      - name: Run smoke tests
        run: npx playwright test e2e/smoke.spec.ts --project=desktop
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222

      - name: Run post-deploy tests
        if: github.event_name == 'push' || github.event_name == 'deployment_status'
        run: npx playwright test e2e/post-deploy.spec.ts --project=desktop
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222

      - name: Run data loading tests
        if: github.event_name == 'push' || github.event_name == 'deployment_status'
        run: npx playwright test e2e/data-loading.spec.ts --project=desktop
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222
        continue-on-error: true

      - name: Run theme tests
        run: npx playwright test e2e/theme.spec.ts --project=desktop
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222
        continue-on-error: true

      - name: Run navigation tests
        run: npx playwright test e2e/navigation.spec.ts --project=desktop
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222
        continue-on-error: true

      - name: Run mobile smoke tests
        run: npx playwright test e2e/smoke.spec.ts --project=mobile
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://f1-pulse-dealmaker-labs-projects.vercel.app' }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS_F1_PULSE }}
          CDP_ENDPOINT: http://127.0.0.1:9222
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
